name: Publish Packages

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Trigger when you push a tag like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test

      - name: Check if version exists
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "Version $VERSION already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM
        if: steps.check.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com/'

      # GitHub Packages requires the scope to match the repo owner,
      # so the copy published here is named @sopheak-hun/number2word.
      # It has its own version check because the two registries can be out of sync.
      - name: Publish to GitHub Packages
        run: |
          npm pkg set name=@sopheak-hun/number2word
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@sopheak-hun/number2word@$VERSION" version > /dev/null 2>&1; then
            echo "Version $VERSION already exists on GitHub Packages"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}